<html>
  
  html {
    font-seze: 21px;    
  }
  
  <style>
    .container_resumo{
      width: max-content;
      min-width: 100%;
      table-layout: auto;
      text-align: center;    
    }
  </style>
  
  <body>
    <h2>Pagamento do {{ dia }}</h2>
    
    <table>
      <tr>
        <th>Aluno</th>
        <th>Valor</th>
        <th>Observação</th>
      </tr> 
      {% for p in pagamentos %}
        <tr>
          <td>{{ p[0] }}</td>
          <td>R$ {{ "%.2f" | format( p[1] ) }}</td>
          <td>{{ p[3] }}</td>
        </tr>  
      {% endfor %}
    
      <br> 
    </table>
    <br>
    Total em Pagamentos:  R$ {{ "%.2f" | format(total_arrecadado ) }}
    <br>
    Quantidade de pagantes:  {{ quantidade_pagamentos }}
    <br>
    
    <a href="/resumo">Voltar</a>
  </body>
</html>
