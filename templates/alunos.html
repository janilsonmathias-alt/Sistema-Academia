<html>
    
    <head>
        <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">

        <style>
            html {
                font-size: 22px;
            }
            body {
                margin: 0;
                padding: 15px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
        </style>
    </head>


    <body>
        <h1>Alunos</h1>

        <a href="/alunos/novo">Cadastrar Novo Aluno</a><br><br>
        <form action="/alunos/importar" method="post" enctype="multipart/form-data">
            <input 
                type = "file"
                id = "arquivo"
                name = "arquivo"
                accept = ".csv"
                style = "display:none"
                onchange = "this.form.submit()">
            <button
                type = "button"
                onclick = "document.getElementById('arquivo').click()">

                Importar Lista de Alunos

            </button>
        </form>        
        <br><br>        
        <a href="/alunos/listar_alunos_cadastrados">Lista de Alunos Cadastrados</a><br><br>
        <a href="/mensalidade/nova">Pagar Mensalidade</a><br><br>
        <a href="/">Voltar ao Inicio</a><br><br>
    </body>


</html>
