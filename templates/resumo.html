<meta name = "viewport" content = "width=device-width, initial-scale = 1.0">

<h2>Resumo do Mês</h2>

<form method = "post">
	Ano: <input type="number" name="ano"><br><br>
	Mes: <input type="number" name="mes"><br><br>
	<button type="submit">Buscar</button>
</form>

{% if faturamento is defined %}
	<h3>Resultados</h3>

	<p>Faturamento: {{ faturamento }}</p>
	<p>Frequencia: {{ frequencia }}</p>
	<p>Despesas: {{ despesas_total }}</p>
	<p>Lucro: {{ lucro }}</p>
{% endif %}
