<meta name = "viewport" content = "width=device-width, initial-scale = 1.0">

<h2>Registrar Despesa</h2>

<form method="post">
	Data: <input type="date" name="data"><br><br>
	Tipo: <input type="text" name="tipo"><br><br>
	Categoria: <input type="text" name="categoria"><br><br>
	Valor: <input type="number" step="0.01" name="valor"><br><br>
	Observação: <input type="text" name="observacao"><br><br>

	<button type="submit">Salvar</button>
</form>
