<html>
  
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    
    <style>
            html {
                font-size: 21px;
            }
            body {
                margin: 0;
                padding: 15px;
                font-size: 1rem;
            }  	
			table {
				width: 100%;
				border-collapse: collapse;
				table-layout: fixed;
			}
			th, td {
				border: 1px solid #ccc;
				padding: 8px;
				text-align: left;
				word-wrap: break-word;
			}
			
            .quadro_scroll {
                overflow-x: auto;
                width: 100%;
                -webkit-overflow-scrolling: touch;
            }
            
            .quadro_mensal {
                width: max-content;
                min-width: 100%;
                border-collapse: collapse;
                table-layout: auto;
            }
            
            .quadro_mensal th,
            .quadro_mensal td {
                white-space: nowrap;
                word-wrap: normal;
            }
            
            .corte_comparativo th,
            .despesas th,
            .fechamentos th,
            .quadro_mensal th{
                background-color: #222 !important;
                color: white !important;
                font-weight: bold;
                text-align: center;
                position: sticky;
                top: 0;
                z-index: 1;
            }
            .corte_comparativo tr:nth-child(even) td,
            .despesas tr:nth-child(even) td,
            .fechamentos tr:nth-child(even) td,
            .quadro_mensal tr:nth-child(even) td{
                background-color: #f5f5f5 !important;
            }
            
			.fechamentos {
				th:nth-child(1), td:nth-child(1) {width: 24%;}
				th:nth-child(2), td:nth-child(2) {width: 27%;}
				th:nth-child(3), td:nth-child(3) {width: 14%;}
			}
			.despesas {
				th:nth-child(1), td:nth-child(1) {width: 28%;}
				th:nth-child(2), td:nth-child(2) {width: 18%;}
				th:nth-child(3), td:nth-child(3) {width: 26%;}
				th:nth-child(4), td:nth-child(4) {width: 18%;}
			}

			.acoes a, .acoes button{
				font-size: 14px;
			}

			.acoes form{
				display: inline;
			}
			.status-pago {
				color: green !important;				
			}
			.status-devendo {
				color: red !important;
			}
		</style>  </head>


  <body>
    <h1>Lista de alunos cadastrados</h1><br><br>

    {% if lista %}
    <div class="table-container">
      <table>
        <tr>
          <th>Id</th>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Plano</th>
          <th>Data Matricula</th>
          <th>Ativo ? </th>        
        </tr>      
        
        {% for lista in lista %}
        <tr>
          <td>{{ lista[0] }}</td>
          <td>{{ lista[1] }}</td>
          <td>{{ lista[2] }}</td>
          <td>{{ lista[3] }}</td>
          <td>{{ lista[4] }}</td>
        </tr>
        {% endfor %}
      </table>
      {% endif %}      
    </div>
    <br><br>
      
    <a href="/">Voltar ao Inicio</a><br><br>
  </body>

  
</html>
