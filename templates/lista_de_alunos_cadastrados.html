<html>


  <body>
    <h1>Lista de alunos cadastrados</h1><br><br>

    {% if lista %}
    <table>
      <tr>
        <th>Id</th>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Plano</th>
        <th>Data de Matricula</th>
        <th>Ativo ? </th>        
      </tr>      
      
      {% for lista in lista %}
      <tr>
        <td>{{ lista[0] }}</td>
        <td>{{ lista[1] }}</td>
        <td>{{ lista[2] }}</td>
        <td>{{ lista[3] }}</td>
        <td>{{ lista[4] }}</td>
      </tr>
      {% endfor %}
    </table>
    {% endif %}
  </body>

  
</html>
