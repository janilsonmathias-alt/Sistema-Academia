<html>
  <head>
    <meta name="viewport" content = "width=device-width, initial-scale = 1.0">
    <style>
      html {
        font-size: 22px;
      }
      body {
        margin: 0;
        padding: 15px;
        font-size:  1rem;
        line-height: 1;
      }        
    </style>    
  </head>

  <body>
    <h2>Registrar Mensalidade</h2>
  
    <form method="post">
      Aluno:
      <input type="text" id="buscaAluno" list="lista_alunos" placeholder="Digite o nome do aluno" autocomplete="off">
      <input type="hidden" name="aluno_id" id="aluno_id">
      
      <datalist id="lista_alunos">
        {% for aluno in alunos %}
          <option value="{{ aluno[1] }}">           
          </option>
        {% endfor %}
      </datalist>    
      <br><br>

      Data do Pagamento:
      <input type="date" name="data_pagamento" value = "{{ hoje }}">
      <br><br>

      Valor
      <input type="number" step = "0.01" name = "valor">
      <br><br>
      
      Competencia:
      <input type="month" name="mes_referencia" value="{{ competencia }}">

      Observação:
      <input type="text" name="observacao">
      <br><br>

      <button type="submit">Salvar</button>
      <a href="/financeiro">Voltar</a>
      
    </form>

    <script>
        const alunos = {{ alunos | tojson }}
        const inputBusca = document.getElementById("buscaAluno");
        const campoAlunoId = document.getElementById("aluno_id");


        function atualizarAlunoId() {
          cont texto = inputBusca.value.trim().toLowerCase();
          campoAlunoId.value = ""; 

          for (const aluno of alunos) {
            const id = aluno[0];
            const nome = String(aluno[1].trim().toLowerCase());

            if (nome === texto) {
              campoAlunoId.value = id;
              break;  
            }
          }                
        }
      
        inputBusca.addEventListener("input", atualizarAlunoId);
        inputBusca.addEventListener("change", atualizarAlunoId);
        inputBusca.addEventListener("blur", atualizarAlunoId);

        document.querySelector("form").addEventListener("submit", function(e) {
          atualizarAlunoId();

          if (!campoAlunoId.value) {
            e.preventDefalut();
            alert("Selecione um aluno valido na lista");
          }
        });
    </script> 
  </body> 
</html>
